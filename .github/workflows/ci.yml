name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)"
      - name: Ruff
        run: python -m ruff check makeitcompliant tests
      - name: Pytest
        run: python -m pytest tests/ -q

  test-prolog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog-nox
      - name: Run plunit compliance rules
        working-directory: prolog/kb/compliance
        run: swipl -g "load_test_files([]), run_tests(compliance_rules), halt." -t halt tests.pl
